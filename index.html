
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe Appeliano TV</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

/* Header */
.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    color: #ff0033;
    font-weight: bold;
}

/* Search */
.search-box {
    padding: 10px;
    text-align: center;
}

.search-box input {
    width: 90%;
    padding: 12px;
    border-radius: 25px;
    border: none;
}

/* Player */
.player {
    padding: 10px;
}

video {
    width: 100%;
    height: 220px;   /* 👉 TV friendly size */
    object-fit: cover;
    border-radius: 10px;
}

/* Channel Slider */
.channel-slider {
    position: relative;
    display: flex;
    align-items: center;
}

.channels {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    gap: 10px;
    padding: 10px;
}

.channels::-webkit-scrollbar {
    display: none;
}

.channel {
    min-width: 100px;
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
}

.channel img {
    width: 60px;
}

.scroll-btn {
    position: absolute;
    background: red;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1;
}

.left { left: 0; }
.right { right: 0; }

/* Footer */
.footer {
    text-align: center;
    padding: 20px;
    color: yellow;
}
</style>
</head>

<body>

<div class="header">Cafe Appeliano TV</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search channel..." onkeyup="searchChannel()">
</div>


<!-- 🎬 Player -->
<div class="player">
<video id="videoPlayer" controls></video>
</div>

<!-- 📺 Channel Slider -->
<div class="channel-slider">

<button class="scroll-btn left" onclick="scrollLeft()">❮</button>

<div class="channels" id="channelContainer">

<div class="channel" data-name="PSL" onclick="playChannel('https://taimoor.pro.bd/live/otvs/playex.php?m3u8=167568&token=d140397c623089c223e0d0c9c57ed4b7f4dd6fd7784ce0182ea9faf903140046&exp=1777208249')">
<img src="https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1777130674815-6ec98da2.jpg">
<p>PSL</p>
</div>

<div class="channel" data-name="Star sports 1" onclick="playChannel('http://4kgood.org/live/4o48up5evz/r4fiast66u/280828.ts')">
<img src="https://i.postimg.cc/N0sYHFDj/20251002_230032.png">
<p>Star Sports 1</p>
</div>

<div class="channel" data-name="A Sports" onclick="playChannel('https://edge2.roarzone.net:8447/roarzone/edge2/a-sports/index.m3u8?token=dfe21cccef54f68131cd222dcfd87b20a3da266b-e450458eb43e140f1ed3e736392edf7f-1777131720-1777120920')">
<img src="https://i.postimg.cc/ZqbZdnHq/20251002_225834.png">
<p> A sports </p>
</div>

<div class="channel" data-name="DEIN SPORTS XTRA" onclick="playChannel('https://bein-esp-xumo.amagi.tv/playlistR1080p.m3u8')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ0-tlk9eDsDoiK0HalkKIX4KIyWzRAWwmsENbDm8xkr9ampgS9mR2psb8&s=10">
<p>DEIN SPORTS XTRA</p>
</div>

<div class="channel" data-name="Now sports Tv" onclick="playChannel('https://eventcdn02-nowe.akamaized.net/hls/CH621/index.m3u8')">
<img src="https://images.now-tv.com/shares/channelPreview/img/en_hk/color/ch621_425_305">
<p>Now sports Tv</p>
</div>

<div class="channel" data-name="BTV" onclick="playChannel('https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/1709-audio_113392_eng=113200-video=1692000.m3u8')">
<img src="https://i.postimg.cc/JnWdHSrq/20250529-071604.png">
<p>BTV</p>
</div>

</div>

<button class="scroll-btn right" onclick="scrollRight()">❯</button>

</div>

<div class="footer">
⚽ Live TV | Cafe Appeliano TV
</div>

<script>


function nextSlide() {
    i = (i + 1) % images.length;
    document.getElementById("slideImg").src = images[i];
}

function prevSlide() {
    i = (i - 1 + images.length) % images.length;
    document.getElementById("slideImg").src = images[i];
}

/* Channel Scroll */
function scrollLeft() {
    document.getElementById("channelContainer").scrollBy({ left: -200, behavior: 'smooth' });
}

function scrollRight() {
    document.getElementById("channelContainer").scrollBy({ left: 200, behavior: 'smooth' });
}

/* Video Play (Auto) */
function playChannel(link) {
    let player = document.getElementById("videoPlayer");
    player.src = link;
    player.muted = true;
    player.play();
}

/* Search */
function searchChannel() {
    let input = document.getElementById("search").value.toLowerCase();
    let channels = document.getElementsByClassName("channel");

    for (let j = 0; j < channels.length; j++) {
        let name = channels[j].getAttribute("data-name").toLowerCase();
        channels[j].style.display = name.includes(input) ? "block" : "none";
    }
}

</script>

</body>
</html>
