.channel {

    text-align: center;
    cursor: pointer;
}

.channel img {

}

.scroll-btn {
    position: absolute;
    background: red;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1;
}

.left { left: 0; }
.right { right: 0; }

/* Footer */
.footer {
    text-align: center;
    padding: 20px;
    color: yellow;

<script>


function nextSlide() {
    i = (i + 1) % images.length;
    document.getElementById("slideImg").src = images[i];
}

function prevSlide() {
    i = (i - 1 + images.length) % images.length;
    document.getElementById("slideImg").src = images[i];
}

/* Channel Scroll */
function scrollLeft() {
    document.getElementById("channelContainer").scrollBy({ left: -200, behavior: 'smooth' });
}

function scrollRight() {
    document.getElementById("channelContainer").scrollBy({ left: 200, behavior: 'smooth' });
}

/* Video Play (Auto) */
function playChannel(link) {
    let player = document.getElementById("videoPlayer");
    player.src = link;
    player.muted = true;
    player.play();
}

/* Search */
function searchChannel() {
    let input = document.getElementById("search").value.toLowerCase();
    let channels = document.getElementsByClassName("channel");

    for (let j = 0; j < channels.length; j++) {
        let name = channels[j].getAttribute("data-name").toLowerCase();
        channels[j].style.display = name.includes(input) ? "block" : "none";
    }
}

</script>
