<script>
function playChannel(link) {
    document.getElementById("videoPlayer").src = link;
    document.getElementById("bannerImg").style.display = "none";
}

function searchChannel() {
    let input = document.getElementById("search").value.toLowerCase();
    let channels = document.getElementsByClassName("channel");

    for (let i = 0; i < channels.length; i++) {
        let name = channels[i].getAttribute("data-name").toLowerCase();
        channels[i].style.display = name.includes(input) ? "block" : "none";
    }
}
