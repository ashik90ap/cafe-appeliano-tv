<style>
body {

    background: #0d0d0d;

/* Header */
.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    color: #ff0033;
    font-weight: bold;
}

/* Search */
.search-box {
    padding: 10px;

}

    width: 90%;
    padding: 12px;
    border-radius: 25px;
    border: none;
}

/* Player */
.player {
    padding: 10px;
}

video {
    width: 100%;
    height: 220px;   /* 👉 TV friendly size */
    object-fit: cover;
    border-radius: 10px;
}

/* Channel Slider */
.channel-slider {
    position: relative;
    display: flex;
    align-items: center;
}

.channels {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    gap: 10px;
    padding: 10px;
}

.channels::-webkit-scrollbar {
    display: none;
}

.channel {
    min-width: 100px;
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
}

.channel img {
    width: 60px;
}

.scroll-btn {
    position: absolute;
    background: red;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1;
}

.left { left: 0; }
.right { right: 0; }

/* Footer */
.footer {
    text-align: center;
    padding: 20px;
    color: yellow;
}
</style>
</head>

<script>


function nextSlide() {
    i = (i + 1) % images.length;
    document.getElementById("slideImg").src = images[i];
}

function prevSlide() {
    i = (i - 1 + images.length) % images.length;
    document.getElementById("slideImg").src = images[i];
}

/* Channel Scroll */
function scrollLeft() {
    document.getElementById("channelContainer").scrollBy({ left: -200, behavior: 'smooth' });
}

function scrollRight() {
    document.getElementById("channelContainer").scrollBy({ left: 200, behavior: 'smooth' });
}

/* Video Play (Auto) */
function playChannel(link) {
    let player = document.getElementById("videoPlayer");
    player.src = link;
    player.muted = true;
    player.play();
}

/* Search */
function searchChannel() {
    let input = document.getElementById("search").value.toLowerCase();
    let channels = document.getElementsByClassName("channel");

    for (let j = 0; j < channels.length; j++) {
        let name = channels[j].getAttribute("data-name").toLowerCase();
        channels[j].style.display = name.includes(input) ? "block" : "none";
    }
}

</script>
